<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SyncLeetcode</title>
    <style>
      :root {
        --bg: #eef1f6;
        --card: #ffffff;
        --border: #d0dae6;
        --text: #1a2332;
        --muted: #5a6a7d;
        --accent: #1a7c3e;
        --accent-soft: rgba(26, 124, 62, 0.1);
        --err: #9b1c1c;
        --err-bg: #fdf2f2;
        --ok: #1a7c3e;
        --ok-bg: #f0faf3;
        --radius: 10px;
        --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 300px;
        margin: 0;
        padding: 0;
        font-family: var(--font);
        font-size: 13px;
        line-height: 1.45;
        color: var(--text);
        background: var(--bg);
        color-scheme: light;
      }

      .shell {
        padding: 14px 14px 16px;
      }

      .header-bar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 12px;
      }

      .header-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .header-brand img {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        border: 1px solid var(--border);
        flex-shrink: 0;
      }

      .header-brand h1 {
        margin: 0;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .header-brand .tagline {
        margin: 2px 0 0;
        font-size: 11px;
        color: var(--muted);
        line-height: 1.4;
      }

      .icon-settings-btn {
        flex-shrink: 0;
        width: 30px;
        height: 30px;
        margin: 4px 0 0;
        padding: 0;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: none;
        transition:
          color 0.15s ease,
          background 0.15s ease,
          transform 0.12s ease;
      }

      .icon-settings-btn svg {
        display: block;
      }

      .icon-settings-btn:hover {
        color: var(--accent);
        background: var(--accent-soft);
      }

      .icon-settings-btn:active {
        transform: scale(0.96);
      }

      .icon-settings-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 12px 10px;
        box-shadow: 0 1px 8px rgba(26, 35, 50, 0.06);
        margin-bottom: 12px;
      }

      .popup-sync-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin: 0 0 12px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        user-select: none;
      }

      .popup-sync-row .popup-sync-label {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        letter-spacing: -0.01em;
      }

      .sync-switch-wrap {
        position: relative;
        flex-shrink: 0;
        width: 38px;
        height: 22px;
      }

      .sync-switch-input {
        position: absolute;
        inset: 0;
        margin: 0;
        width: 38px;
        height: 22px;
        opacity: 0;
        cursor: pointer;
        z-index: 2;
      }

      .sync-switch-track {
        position: absolute;
        inset: 0;
        border-radius: 11px;
        background: linear-gradient(180deg, #c5ced9 0%, #b4becb 100%);
        box-shadow:
          inset 0 1px 2px rgba(0, 0, 0, 0.12),
          0 1px 0 rgba(255, 255, 255, 0.65);
        transition:
          background 0.22s ease,
          box-shadow 0.22s ease;
      }

      .sync-switch-track::after {
        content: '';
        position: absolute;
        top: 2px;
        left: 2px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: linear-gradient(180deg, #ffffff 0%, #f0f3f7 100%);
        box-shadow:
          0 1px 3px rgba(26, 35, 50, 0.22),
          0 0 0 1px rgba(255, 255, 255, 0.9) inset;
        transition: transform 0.24s cubic-bezier(0.34, 1.2, 0.64, 1);
      }

      .sync-switch-input:checked ~ .sync-switch-track {
        background: linear-gradient(180deg, #1f8f4a 0%, var(--accent) 100%);
        box-shadow:
          inset 0 1px 2px rgba(0, 0, 0, 0.08),
          0 0 0 1px rgba(26, 124, 62, 0.35);
      }

      .sync-switch-input:checked ~ .sync-switch-track::after {
        transform: translateX(16px);
      }

      .sync-switch-input:focus-visible ~ .sync-switch-track {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .sync-switch-input:disabled ~ .sync-switch-track {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .sync-paused-banner {
        font-size: 11px;
        line-height: 1.4;
        color: var(--muted);
        background: rgba(90, 106, 125, 0.08);
        border: 1px solid rgba(208, 218, 230, 0.9);
        border-radius: 8px;
        padding: 8px 10px;
        margin-bottom: 10px;
      }

      .repo-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
        background: var(--accent-soft);
        padding: 6px 10px;
        border-radius: 8px;
        margin-bottom: 10px;
        max-width: 100%;
        word-break: break-all;
      }

      .repo-pill svg {
        flex-shrink: 0;
        color: var(--accent);
      }

      .status-block {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        padding: 10px;
        border-radius: 8px;
        font-size: 12px;
      }

      .status-block svg {
        flex-shrink: 0;
        margin-top: 1px;
      }

      .status-block.ok {
        background: var(--ok-bg);
        color: var(--ok);
        border: 1px solid rgba(26, 124, 62, 0.2);
      }

      .status-block.err {
        background: var(--err-bg);
        color: var(--err);
        border: 1px solid rgba(155, 28, 28, 0.2);
      }

      .status-block .time {
        font-weight: 600;
        margin-bottom: 4px;
      }

      .status-block .path {
        font-family: ui-monospace, Menlo, monospace;
        font-size: 11px;
        opacity: 0.9;
        word-break: break-all;
      }

      .status-block .friendly {
        font-weight: 600;
        margin-bottom: 6px;
        line-height: 1.35;
      }

      .status-block .detail {
        font-size: 10px;
        font-family: ui-monospace, Menlo, monospace;
        opacity: 0.85;
        word-break: break-word;
        line-height: 1.35;
        max-height: 4.2em;
        overflow: hidden;
      }

      .hint-muted {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.4;
      }

      .hint-sub {
        font-size: 10px;
        color: var(--muted);
        margin: 8px 0 0;
        line-height: 1.35;
        opacity: 0.92;
      }

      .hint-warn {
        font-size: 12px;
        color: var(--err);
        line-height: 1.4;
      }

      .hint-below {
        margin-top: 8px;
        font-weight: 600;
      }

      .today-stats {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
        font-size: 11px;
      }

      .today-label {
        font-weight: 700;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        margin-bottom: 6px;
      }

      .today-chips {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 4px 6px;
        line-height: 1.35;
      }

      .today-dot {
        color: var(--border);
        user-select: none;
      }

      .today-total {
        margin-top: 4px;
        font-size: 10px;
        color: var(--muted);
      }

      .today-muted {
        color: var(--muted);
        font-size: 11px;
      }

      .d-easy {
        font-weight: 600;
        color: #1a7c3e;
      }

      .d-med {
        font-weight: 600;
        color: #b8860b;
      }

      .d-hard {
        font-weight: 600;
        color: var(--err);
      }

      .d-other {
        font-weight: 600;
        color: var(--muted);
      }

      .total-alltime {
        margin-top: 8px;
        padding-top: 10px;
      }

      .total-sync-value {
        font-size: 11px;
        font-weight: 600;
        color: var(--text);
        line-height: 1.35;
      }

      .total-sync-hint {
        margin-top: 4px;
        font-size: 10px;
      }

      .spark-section {
        margin: 10px 0 12px;
        padding: 10px 8px 12px;
        border-radius: 8px;
        background: linear-gradient(180deg, #f4f6f9 0%, #fafbfc 100%);
        border: 1px solid rgba(208, 218, 230, 0.85);
        overflow: visible;
      }

      .spark-heading {
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin-bottom: 8px;
        text-align: center;
      }

      .spark-bars {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 8px;
        padding: 0 2px;
      }

      .spark-col {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 0;
      }

      /* Fixed band so bar height never pushes labels out of the card */
      .spark-bar-track {
        width: 100%;
        max-width: 34px;
        height: 36px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: stretch;
        flex-shrink: 0;
      }

      .spark-bar-fill {
        width: 100%;
        min-height: 4px;
        border-radius: 4px;
        background: linear-gradient(180deg, #9bc4aa 0%, #6d9a80 100%);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
        transition: height 0.25s ease;
      }

      .spark-bar-fill.is-zero {
        background: #e2e8ef;
        box-shadow: none;
        min-height: 4px;
        opacity: 1;
      }

      .spark-count {
        font-size: 11px;
        font-weight: 700;
        color: var(--text);
        margin-top: 6px;
        line-height: 1;
        flex-shrink: 0;
      }

      .spark-day {
        font-size: 9px;
        font-weight: 600;
        color: var(--muted);
        margin-top: 4px;
        line-height: 1.2;
        text-transform: capitalize;
        white-space: nowrap;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="header-bar">
        <div class="header-brand">
          <img src="icons/icon48.png" alt="" width="48" height="48" />
          <div>
            <h1>SyncLeetcode</h1>
            <p class="tagline">Sync to GitHub when your run is <strong>Accepted</strong> on LeetCode.</p>
          </div>
        </div>
        <button type="button" class="icon-settings-btn" id="openOptions" title="Settings" aria-label="Open settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>
      </header>

      <div class="card" id="card">
        <label class="popup-sync-row" for="popupSyncEnabled">
          <span class="popup-sync-label">Open Sync</span>
          <span class="sync-switch-wrap">
            <input id="popupSyncEnabled" class="sync-switch-input" type="checkbox" checked />
            <span class="sync-switch-track" aria-hidden="true"></span>
          </span>
        </label>
        <div id="state"></div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
